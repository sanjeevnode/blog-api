name: blog-api

services:
  # The FastAPI application service
  api:
    container_name: blog-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${APP_PORT:-7210}:8000"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
      rustfs:
        condition: service_started
    entrypoint: >
      bash -c "python scripts/ensure_bucket.py &&
               alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  # Database Service (PostgreSQL 16)
  db:
    container_name: blog-db
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
    ports:
      - "${POSTGRES_HOST_PORT:-7211}:5432"
    volumes:
      - blog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Cache & OTP store (Redis)
  redis:
    container_name: blog-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-7213}:6379"
    restart: unless-stopped

  # Local email capturing server (Mailpit)
  mailpit:
    container_name: blog-mailpit
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-7212}:8025"
      - "${MAILPIT_SMTP_PORT:-7216}:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

  # Local S3 Object storage (RustFS)
  rustfs:
    container_name: blog-rustfs
    image: rustfs/rustfs:latest
    ports:
      - "${RUSTFS_PORT:-7214}:9000"
      - "${RUSTFS_CONSOLE_PORT:-7215}:9001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
    volumes:
      - blog_rustfs:/data
    restart: unless-stopped

  # GUI client for Postgres (pgAdmin)
  pgadmin:
    container_name: blog-pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blog.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-7217}:80"
    volumes:
      - blog_pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  blog_pgdata:
  blog_rustfs:
  blog_pgadmin:
